<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 20px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

<h3>QR Scanner</h3>
<div id="reader"></div>

<script>

const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

function sendToSheet(qr) {
  console.log("Sending QR:", qr);

  fetch(API_URL + "?qr=" + encodeURIComponent(qr))
    .then(res => res.text())
    .then(data => {
      console.log("Server response:", data);
    })
    .catch(err => {
      console.error("Error sending to sheet:", err);
    });
}

Html5Qrcode.getCameras().then(devices => {

  let backCameraId = devices[0].id;

  // try to find back camera
  devices.forEach(device => {
    const label = device.label.toLowerCase();
    if (
      label.includes("back") ||
      label.includes("rear") ||
      label.includes("environment")
    ) {
      backCameraId = device.id;
    }
  });

  const scanner = new Html5Qrcode("reader");

  scanner.start(
    backCameraId,
    {
      fps: 10,
      qrbox: 250
    },
    (decodedText) => {
      sendToSheet(decodedText);
    },
    (errorMessage) => {
      // ignore scan errors
    }
  );

}).catch(err => {
  console.error("Camera error:", err);
});

</script>

</body>
</html>
