<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: "Inter", Arial, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #111827;
  }

  .container {
    width: 95%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align: center;
  }


  /* TITLE */
  .inventory-title {
    font-size: 18px;
    font-weight: 700;
    margin: 10px 0 4px;
  }

  .inventory-title span {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #6b7280;
    margin-top: 4px;
  }

  /* QR READER BOX */
  #reader {
    width: 100%;
    height: 45vh;       
    margin-top: 12px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
  }

  /* BUTTON */
  button {
    margin-top: 18px;
    padding: 12px 18px;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
    width: 100%;
    font-weight: 600;
    transition: 0.2s ease;
  }

  button:hover {
    background: #4338ca;
  }

  button:active {
    transform: scale(0.98);
  }

  /* STATUS */
  #status {
    margin-top: 14px;
    font-size: 13px;
    padding: 10px;
    border-radius: 10px;
    background: #f3f4f6;
    color: #374151;
  }

</style>
</head>

<body>

<div class="container">



  <h3 class="inventory-title">
    CARICOOS
    <span>QR-Enabled Equipment Inventory List</span>
  </h3>

  <div id="reader"></div>

  <button id="saveBtn">Save QR Code</button>

  <div id="status">Ready to scan</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbx6ZavxOniEWos1BmdlcSg3NcbzQTDYGK77r1gDRkMkEgPZjukWfLeEsfQR2NrcFJT5/exec";

const scanner = new Html5Qrcode("reader");

let lastQR = null;

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function sendToSheet(qr) {

  fetch(API_URL + "?qr=" + encodeURIComponent(qr))
    .then(res => res.text())
    .then(result => {

      setStatus(
        result === "DUPLICATE"
          ? "⚠ Already exists in system"
          : "✅ Saved successfully"
      );

    })
    .catch(err => {
      console.error(err);
      setStatus("❌ Error sending data");
    });

}

function onScanSuccess(decodedText) {

  if (decodedText === lastQR) return;

  lastQR = decodedText;

  setStatus(
    "QR Detected: " + decodedText + " (Press Save)"
  );

}

async function startCamera() {

  try {

    await scanner.start(
      {
        facingMode: "environment"
      },
      {
        fps: 15,

        // Smaller scan area helps with small QR stickers
        qrbox: {
          width: 250,
          height: 250
        },

        aspectRatio: 1.777,

        videoConstraints: {
          facingMode: "environment",
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      },
      onScanSuccess
    );

    // Try zooming in slightly on supported devices
  try {
  
    const track = scanner.getRunningTrack();
    const caps = track.getCapabilities();
  
    if (caps.zoom) {
  
      const zoom = Math.min(
        3,
        caps.zoom.max
      );
  
      await track.applyConstraints({
        advanced: [
          { zoom: zoom }
        ]
      });
  
      console.log("Using zoom:", zoom);
    }
  
  } catch(e) {
    console.log("Zoom unavailable", e);
  }

document.getElementById("saveBtn").addEventListener("click", () => {

  if (!lastQR) {
    setStatus("⚠ No QR detected");
    return;
  }

  setStatus("⏳ Saving: " + lastQR);

  sendToSheet(lastQR);

  lastQR = null;

});

startCamera();

</script>

</body>
</html>
