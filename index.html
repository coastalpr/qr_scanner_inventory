<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 20px;
  }

  #reader {
    width: 300px;
    margin: auto;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h3>QR Scanner</h3>

<div id="reader"></div>

<button id="scanBtn">Scan Once</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw4ZtbLqpovkXsFPH5pSLI3Bx00UusqfXA4TXV5F3Jnu5AxHxf9f1zUYZ3BGm2JPMfO/exec";

const scanner = new Html5Qrcode("reader");

let cameraId = null;
let isRunning = false;

// send to sheet
function sendToSheet(qr) {

  fetch(API_URL + "?qr=" + encodeURIComponent(qr))
    .then(res => res.text())
    .then(data => console.log("Sheet response:", data))
    .catch(err => console.error("Fetch error:", err));

}

// start camera ONCE (preview only, no scanning loop)
function startCamera() {

  Html5Qrcode.getCameras().then(devices => {

    if (!devices || devices.length === 0) {
      alert("No camera found");
      return;
    }

    cameraId = devices[0].id;

    // prefer back camera
    for (let d of devices) {
      const label = d.label.toLowerCase();
      if (label.includes("back") || label.includes("rear")) {
        cameraId = d.id;
        break;
      }
    }

    // start camera preview ONLY (no scanning yet)
    scanner.start(
      cameraId,
      {
        fps: 10,
        qrbox: 250
      },
      () => {} // IMPORTANT: empty callback → prevents auto scanning behavior
    );

  });

}

// scan ONLY when button pressed
async function scanOnce() {

  if (isRunning) return;
  isRunning = true;

  try {

    const result = await scanner.scanFile(null, true);

    // fallback not needed in most cases
    console.log("SCAN RESULT:", result);

  } catch (err) {

    console.log("Switching to live scan mode...");

    // If scanFile not supported, use controlled live scan ONCE
    scanner.render(
      (decodedText) => {

        console.log("QR:", decodedText);
        sendToSheet(decodedText);

        scanner.stop(); // STOP immediately → no duplicates
        isRunning = false;

      },
      {
        fps: 10,
        qrbox: 250
      }
    );

  }

}

// button event
document.getElementById("scanBtn").addEventListener("click", () => {
  scanOnce();
});

// init camera preview
startCamera();

</script>

</body>
</html>
