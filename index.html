<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 20px;
  }

  #reader {
    width: 300px;
    margin: auto;
  }
</style>
</head>

<body>

<h3>QR Scanner</h3>
<div id="reader"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw4ZtbLqpovkXsFPH5pSLI3Bx00UusqfXA4TXV5F3Jnu5AxHxf9f1zUYZ3BGm2JPMfO/exec";

const scanner = new Html5Qrcode("reader");

// ===== DUPLICATE CONTROL =====
let scanningEnabled = true;
let lastScannedText = "";

// Send to Google Sheets
function sendToSheet(qr) {
  fetch(API_URL + "?qr=" + encodeURIComponent(qr))
    .then(() => console.log("Saved:", qr))
    .catch(err => console.error("Fetch error:", err));
}

// QR scan handler (ANTI-DUPLICATE LOGIC)
function onScanSuccess(decodedText) {
  if (!scanningEnabled) return;

  // block same scan spam
  if (decodedText === lastScannedText) return;

  lastScannedText = decodedText;
  scanningEnabled = false;

  console.log("QR detected:", decodedText);
  sendToSheet(decodedText);

  // re-enable scanning after 3 seconds
  setTimeout(() => {
    scanningEnabled = true;
  }, 3000);
}

// Start camera
Html5Qrcode.getCameras().then(devices => {
  if (!devices || devices.length === 0) {
    alert("No camera found");
    return;
  }

  let cameraId = devices[0].id;

  // Prefer back camera
  for (let device of devices) {
    const label = device.label.toLowerCase();
    if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
      cameraId = device.id;
      break;
    }
  }

  scanner.start(
    cameraId,
    {
      fps: 10,
      qrbox: { width: 200, height: 200 },
      aspectRatio: 1.0,
      experimentalFeatures: {
        useBarCodeDetectorIfSupported: true
      }
    },
    onScanSuccess
  )
  .then(() => console.log("Camera started"))
  .catch(err => {
    console.error("Camera error:", err);
    alert("Camera failed: " + err);
  });

}).catch(err => {
  console.error("getCameras error:", err);
  alert("Cannot access camera");
});
</script>

</body>
</html>
