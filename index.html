<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 20px;
  }

  #reader {
    width: 300px;
    margin: auto;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h3>QR Scanner</h3>

<div id="reader"></div>

<button id="scanBtn">Scan Once</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw4ZtbLqpovkXsFPH5pSLI3Bx00UusqfXA4TXV5F3Jnu5AxHxf9f1zUYZ3BGm2JPMfO/exec";

const scanner = new Html5Qrcode("reader");

let cameraId = null;
let scanning = false;

// send to Google Sheet
function sendToSheet(qr) {

  console.log("Sending to sheet:", qr);

  fetch(API_URL + "?qr=" + encodeURIComponent(qr))
    .then(res => res.text())
    .then(data => console.log("Sheet response:", data))
    .catch(err => console.error("Fetch error:", err));

}

// start camera preview
function startCamera() {

  Html5Qrcode.getCameras().then(devices => {

    if (!devices || devices.length === 0) {
      alert("No camera found");
      return;
    }

    cameraId = devices[0].id;

    for (let d of devices) {
      const name = d.label.toLowerCase();
      if (name.includes("back") || name.includes("rear")) {
        cameraId = d.id;
        break;
      }
    }

    scanner.start(
      cameraId,
      {
        fps: 10,
        qrbox: 250
      },
      () => {}
    ).then(() => {
      console.log("Camera started");
    }).catch(err => {
      console.error("Camera error:", err);
      alert(err);
    });

  });

}

// ONE SCAN ONLY
function scanOnce() {

  if (scanning) return;
  scanning = true;

  scanner.render(
    (decodedText) => {

      console.log("QR detected:", decodedText);

      sendToSheet(decodedText);

      scanner.stop().then(() => {
        console.log("Scanner stopped");
        scanning = false;
      });

    },
    {
      fps: 10,
      qrbox: 250
    }
  );

}

// button
document.getElementById("scanBtn").addEventListener("click", scanOnce);

// init
startCamera();

</script>

</body>
</html>
