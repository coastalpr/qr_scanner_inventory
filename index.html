<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 20px;
  }

  #reader {
    width: 300px;
    margin: auto;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
  }

  #status {
    margin-top: 10px;
    font-weight: bold;
  }
</style>
</head>

<body>

<h3>
  CARICOOS<br>
  <span>QR-Enabled Equipment Inventory List</span>
</h3>

<div id="reader"></div>

<button id="saveBtn">Save QR Code</button>

<div id="status">No QR detected yet</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbx6ZavxOniEWos1BmdlcSg3NcbzQTDYGK77r1gDRkMkEgPZjukWfLeEsfQR2NrcFJT5/exec";

const scanner = new Html5Qrcode("reader");

let cameraId = null;
let lastQR = null;

// send to sheet
function sendToSheet(qr) {

  console.log("➡ SENDING REQUEST:", qr);

  fetch(API_URL + "?qr=" + encodeURIComponent(qr))
    .then(res => res.text())
    .then(result => {

      console.log("⬅ SERVER RESPONSE:", result);

      setStatus(result === "DUPLICATE"
        ? "⚠ Already exists"
        : "✅ Saved / Processed"
      );

    })
    .catch(err => {
      console.error("FETCH ERROR:", err);
    });

}
  
// update UI
function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

// start camera + continuous detection (NO SAVE AUTOMATICALLY)
function startCamera() {

  Html5Qrcode.getCameras().then(devices => {

    if (!devices || devices.length === 0) {
      alert("No camera found");
      return;
    }

    cameraId = devices[0].id;

    for (let d of devices) {
      const name = d.label.toLowerCase();
      if (name.includes("back") || name.includes("rear")) {
        cameraId = d.id;
        break;
      }
    }

    scanner.start(
      cameraId,
      {
        fps: 10,
        qrbox: 250
      },
      (decodedText) => {

        // store latest QR only
        lastQR = decodedText;

        setStatus("QR Detected: " + decodedText + " (Press Save)");

      }
    ).catch(err => {
      console.error(err);
      alert("Camera error: " + err);
    });

  });

}

// SAVE ONLY WHEN BUTTON PRESSED
document.getElementById("saveBtn").addEventListener("click", () => {

  if (!lastQR) {
    alert("No QR detected yet");
    return;
  }

  sendToSheet(lastQR);
  setStatus("Saved: " + lastQR);

  lastQR = null; // reset to avoid duplicates

});

startCamera();

</script>

</body>
</html>
