<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 20px;
  }

  #reader {
    width: 300px;
    margin: auto;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h3>QR Scanner</h3>

<div id="reader"></div>

<button onclick="scanOnce()">Scan QR Code</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw4ZtbLqpovkXsFPH5pSLI3Bx00UusqfXA4TXV5F3Jnu5AxHxf9f1zUYZ3BGm2JPMfO/exec";

const scanner = new Html5Qrcode("reader");

let cameraId = null;
let scanning = false;

// Send to Google Sheets
function sendToSheet(qr) {
  fetch(API_URL + "?qr=" + encodeURIComponent(qr))
    .then(() => console.log("Saved:", qr))
    .catch(err => console.error("Error:", err));
}

// Run scan only when button clicked
function scanOnce() {

  if (scanning) return;
  scanning = true;

  scanner.scanFile().catch(() => {
    console.log("No file scan support, using camera scan instead");
  });

  scanner.start(
    cameraId,
    {
      fps: 10,
      qrbox: 250
    },
    (decodedText) => {

      console.log("QR:", decodedText);

      sendToSheet(decodedText);

      // STOP immediately → prevents duplicates
      scanner.stop().then(() => {
        console.log("Scanner stopped");
        scanning = false;
      });

    }
  ).catch(err => {
    console.error("Start error:", err);
    scanning = false;
  });

}

// Init camera once
Html5Qrcode.getCameras().then(devices => {

  if (!devices || devices.length === 0) {
    alert("No camera found");
    return;
  }

  cameraId = devices[0].id;

  // prefer back camera
  for (let d of devices) {
    const name = d.label.toLowerCase();
    if (name.includes("back") || name.includes("rear")) {
      cameraId = d.id;
      break;
    }
  }

  console.log("Camera ready");

}).catch(err => {
  console.error(err);
  alert("Camera permission denied or not available");
});

</script>

</body>
</html>
