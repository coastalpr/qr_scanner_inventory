<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align:center;
  margin-top:20px;
}

#reader {
  width:300px;
  margin:auto;
}
</style>

</head>

<body>

<h3>QR Scanner</h3>

<div id="reader"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw4ZtbLqpovkXsFPH5pSLI3Bx00UusqfXA4TXV5F3Jnu5AxHxf9f1zUYZ3BGm2JPMfO/exec";


function sendToSheet(qr) {

  fetch(API_URL + "?qr=" + encodeURIComponent(qr))
  .then(() => {
    console.log("Saved:", qr);
  })
  .catch(err => {
    console.log("Error:", err);
  });

}


// duplicate protection
let lastQR = "";
let locked = false;


function onScanSuccess(text) {

  if (locked) return;

  if (text === lastQR) return;


  lastQR = text;
  locked = true;


  console.log("SCAN:", text);

  sendToSheet(text);


  setTimeout(() => {
    locked = false;
  }, 3000);

}



const scanner = new Html5Qrcode("reader");



Html5Qrcode.getCameras()
.then(cameras => {


  if (cameras.length === 0) {

    alert("No camera detected");
    return;

  }


  let cameraId = cameras[0].id;


  // choose rear camera if available
  for (let cam of cameras) {

    let name = cam.label.toLowerCase();

    if (
      name.includes("back") ||
      name.includes("rear") ||
      name.includes("environment")
    ) {
      cameraId = cam.id;
      break;
    }

  }



  scanner.start(

    cameraId,

    {
      fps: 10,
      qrbox: 200
    },

    onScanSuccess

  )

  .then(() => {

    console.log("Camera active");

  })

  .catch(err => {

    console.log(err);
    alert("Camera failed: " + err);

  });



})


.catch(err => {

  alert("Camera permission denied or unavailable");

  console.log(err);

});



</script>

</body>
</html>
